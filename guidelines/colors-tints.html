<!-- @dsCard group="Colors" viewport="700x140" name="Tints & washes" subtitle="Pale surfaces derived from the accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper)}
 .wrap{display:flex;gap:10px;padding:20px;flex-wrap:wrap}
 .sw{flex:1;min-width:90px;height:96px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--ink-25);color:var(--ink)}
 .n{font-weight:600;font-size:11px}.h{font-size:10px;color:var(--ink-50)}
</style></head><body>
<div class="wrap">
 <div class="sw" style="background:var(--red-tint)"><span class="n">red-tint</span><span class="h">#F6D4D6</span></div>
 <div class="sw" style="background:var(--coral-soft)"><span class="n">coral-soft</span><span class="h">#F0B4AC</span></div>
 <div class="sw" style="background:var(--coral-wash)"><span class="n">coral-wash</span><span class="h">#F9E2DE</span></div>
 <div class="sw" style="background:var(--mint-soft)"><span class="n">mint-soft</span><span class="h">#C2E7E1</span></div>
 <div class="sw" style="background:var(--mint-wash)"><span class="n">mint-wash</span><span class="h">#E6F5F2</span></div>
</div>
</body></html>
