<!-- @dsCard group="Colors" viewport="700x150" name="Core palette" subtitle="Navy ink · alarm red · coral · mint, on white" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper)}
 .wrap{display:flex;gap:0;padding:20px}
 .sw{flex:1;height:110px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
 .n{font-weight:700;font-size:13px}.h{font-size:11px;opacity:.8;letter-spacing:.04em}
 .wrap>.sw+.sw{margin-left:12px}
</style></head><body>
<div class="wrap">
 <div class="sw" style="background:var(--ink);color:#fff"><span class="n">Ink</span><span class="h">#13314F</span></div>
 <div class="sw" style="background:var(--red);color:#fff"><span class="n">Red</span><span class="h">#DC2B33</span></div>
 <div class="sw" style="background:var(--coral);color:#fff"><span class="n">Coral</span><span class="h">#E68C81</span></div>
 <div class="sw" style="background:var(--mint);color:var(--ink)"><span class="n">Mint</span><span class="h">#9AD5CD</span></div>
 <div class="sw" style="background:var(--paper-warm);color:var(--ink);border:1px solid var(--ink-25)"><span class="n">Paper</span><span class="h">#FFFFFF / #FCFBF8</span></div>
</div>
</body></html>
