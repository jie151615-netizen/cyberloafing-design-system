<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:26px}
 .row{display:flex;align-items:flex-end;gap:18px}
 .col{display:flex;flex-direction:column;align-items:center;gap:8px}
 .bar{background:var(--coral);border-radius:2px}
 .t{font-size:11px;color:var(--ink-50)}
</style></head><body>
<div class="row">
 <div class="col"><div class="bar" style="width:4px;height:4px"></div><span class="t">1·4</span></div>
 <div class="col"><div class="bar" style="width:8px;height:8px"></div><span class="t">2·8</span></div>
 <div class="col"><div class="bar" style="width:12px;height:12px"></div><span class="t">3·12</span></div>
 <div class="col"><div class="bar" style="width:16px;height:16px"></div><span class="t">4·16</span></div>
 <div class="col"><div class="bar" style="width:24px;height:24px"></div><span class="t">5·24</span></div>
 <div class="col"><div class="bar" style="width:32px;height:32px"></div><span class="t">6·32</span></div>
 <div class="col"><div class="bar" style="width:48px;height:48px"></div><span class="t">7·48</span></div>
 <div class="col"><div class="bar" style="width:64px;height:64px"></div><span class="t">8·64</span></div>
</div>
</body></html>
