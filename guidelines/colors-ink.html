<!-- @dsCard group="Colors" viewport="700x150" name="Ink hierarchy" subtitle="Navy tints for text hierarchy on white" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:22px}
 .row{display:flex;flex-direction:column;gap:10px}
 .line{display:flex;align-items:center;gap:16px}
 .chip{width:56px;height:24px;border-radius:var(--radius-sm);border:1px solid var(--ink-25)}
 .t{font-size:20px;font-weight:600}.h{font-size:12px;color:var(--ink-50);margin-left:auto}
</style></head><body>
<div class="row">
 <div class="line"><span class="chip" style="background:var(--ink)"></span><span class="t" style="color:var(--ink)">Ink · primary text</span><span class="h">#13314F</span></div>
 <div class="line"><span class="chip" style="background:var(--ink-70)"></span><span class="t" style="color:var(--ink-70)">Ink-70 · muted / captions</span><span class="h">#5A7085</span></div>
 <div class="line"><span class="chip" style="background:var(--ink-50)"></span><span class="t" style="color:var(--ink-50)">Ink-50 · placeholder</span><span class="h">#8997A6</span></div>
 <div class="line"><span class="chip" style="background:var(--ink-25)"></span><span class="t" style="color:var(--ink-25)">Ink-25 · hairlines</span><span class="h">#C4CCD4</span></div>
</div>
</body></html>
