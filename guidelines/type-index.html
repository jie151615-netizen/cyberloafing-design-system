<!-- @dsCard group="Type" viewport="700x160" name="Index & stamp" subtitle="Star index rows + tracked stamp texture" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:26px;display:flex;gap:60px;align-items:center}
 .idx{display:flex;flex-direction:column;gap:8px}
 .r{display:flex;gap:12px;align-items:center;font-size:15px;color:var(--ink-70)}
 .lbl{min-width:150px}.stars{color:var(--red);letter-spacing:2px}
 .stamp{font-weight:700;font-size:15px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-25)}
</style></head><body>
 <div class="idx">
  <div class="r"><span class="lbl">Risk Index:</span><span class="stars">★★★★★★</span></div>
  <div class="r"><span class="lbl">Leisure Index:</span><span class="stars">★★★★★</span></div>
  <div class="r"><span class="lbl">Realization Index:</span><span class="stars">★★★</span></div>
 </div>
 <div class="stamp">WORKING&nbsp;&nbsp;WORKING&nbsp;&nbsp;WORKING</div>
</body></html>
