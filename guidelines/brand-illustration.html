<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:20px}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
 .cell{border:1px solid var(--ink-25);border-radius:var(--radius-sm);overflow:hidden;display:flex;flex-direction:column}
 .img{height:210px;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:12px;box-sizing:border-box}
 .img img{max-width:100%;max-height:100%;object-fit:contain}
 .lbl{font-size:11px;color:var(--ink-70);padding:8px 10px;border-top:1px solid var(--ink-25)}
</style></head><body>
<div class="grid">
 <div class="cell"><div class="img"><img src="../assets/illustrations/scenes/scene-cover.png"></div><div class="lbl">Monoline navy — objects & vignettes</div></div>
 <div class="cell"><div class="img"><img src="../assets/illustrations/scenes/scene-10.png"></div><div class="lbl">Red spot-color comic — school scenes</div></div>
 <div class="cell"><div class="img"><img src="../assets/illustrations/scenes/scene-05.png"></div><div class="lbl">Coral + mint comic — office scenes</div></div>
</div>
</body></html>
