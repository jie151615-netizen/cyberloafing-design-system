<!-- @dsCard group="Games" viewport="720x1200" name="Cyberloafing Arcade" subtitle="All three levels (浅/中/高摸鱼) with one shared 中/EN/IT switch" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>赛博摸鱼街机厅 · Cyberloafing Arcade</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  body { min-height: 100vh; overscroll-behavior: none; }

  #root { display: flex; justify-content: center; padding: var(--space-6) var(--space-4) var(--space-9); }
  .page { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: var(--space-5); }

  /* ---- Header ---- */
  .header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; }
  .brand-group { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: var(--space-2); color: var(--ink); }
  .brand span { font-weight: var(--fw-bold); letter-spacing: .04em; font-size: 15px; text-transform: uppercase; }

  .home-btn {
    font: inherit; font-weight: var(--fw-bold); font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
    padding: 6px 14px; border-radius: var(--radius-pill); border: 2px solid var(--ink-25); color: var(--ink-70);
    text-decoration: none; white-space: nowrap; transition: all var(--dur-base) var(--ease-standard);
  }
  .home-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--mint-wash); }

  .lang-switch { display: flex; gap: 4px; border: 2px solid var(--ink); border-radius: var(--radius-pill); padding: 3px; flex: none; }
  .lang-btn {
    font: inherit; font-weight: var(--fw-bold); font-size: 13px; letter-spacing: .03em;
    min-width: 40px; padding: 6px 10px; border: none; border-radius: var(--radius-pill);
    background: transparent; color: var(--ink); cursor: pointer; transition: background var(--dur-base) var(--ease-standard), color var(--dur-base) var(--ease-standard);
  }
  .lang-btn.active { background: var(--ink); color: var(--paper); }
  .lang-btn:not(.active):hover { background: var(--mint-wash); }

  .arcade-subtitle { margin: 0; text-align: center; color: var(--ink-70); font-size: 14px; }

  /* ---- Level tabs ---- */
  .tabs { display: flex; gap: var(--space-2); }
  .tab-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: inherit; font-weight: var(--fw-bold); font-size: 13px; letter-spacing: .02em; text-transform: uppercase;
    padding: 10px 8px; border-radius: var(--radius-md); border: 2px solid var(--ink-25); background: var(--paper);
    color: var(--ink); cursor: pointer; transition: all var(--dur-base) var(--ease-standard);
  }
  .tab-btn:hover { border-color: var(--ink-50); }
  .tab-dot { width: 9px; height: 9px; border-radius: 999px; flex: none; }

  /* ---- Masthead (per active level) ---- */
  .masthead { text-align: center; display: flex; flex-direction: column; gap: var(--space-2); }
  .wordmark { margin: 0; font-weight: var(--fw-black); text-transform: uppercase; color: var(--ink); line-height: var(--lh-tight); letter-spacing: var(--ls-display); }
  .subtitle { margin: 0 auto; color: var(--red); font-weight: var(--fw-medium); font-size: clamp(15px, 3vw, 19px); line-height: var(--lh-heading); max-width: 480px; overflow-wrap: break-word; }
  .tagline { margin: 0 auto; color: var(--ink-70); font-size: 14px; line-height: var(--lh-body); max-width: 440px; overflow-wrap: break-word; }

  /* ---- HUD ---- */
  .hud { display: flex; gap: var(--space-5); justify-content: center; flex-wrap: wrap; }
  .hud-block { flex: 1 1 180px; max-width: 240px; background: var(--paper-warm); border-radius: var(--radius-md); padding: var(--space-4); text-align: center; }
  .hud-label { font-size: 12px; font-weight: var(--fw-bold); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-50); min-height: 2.4em; display: flex; align-items: center; justify-content: center; overflow-wrap: break-word; }
  .hud-value { font-size: 36px; font-weight: var(--fw-black); color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; margin-top: 4px; }
  .hud-sub { margin-top: 6px; font-size: 13px; font-weight: var(--fw-medium); color: var(--ink-50); min-height: 1.4em; overflow-wrap: break-word; }
  .hud-sub.at-risk { color: var(--coral); }
  .hud-sub.danger-tag { color: var(--red); font-weight: var(--fw-bold); letter-spacing: .04em; }

  .speed-bar { margin-top: 12px; height: 10px; border-radius: var(--radius-pill); background: var(--ink-25); overflow: hidden; }
  .speed-fill { width: 100%; height: 100%; border-radius: var(--radius-pill); transform-origin: left center; transition: transform 120ms linear, background 120ms linear; }

  /* ---- Toast ---- */
  .toast-zone { min-height: 30px; display: flex; align-items: center; justify-content: center; }
  .toast { font-size: 14px; font-weight: var(--fw-medium); padding: 6px 16px; border-radius: var(--radius-pill); max-width: 480px; text-align: center; overflow-wrap: break-word; animation: fadeIn var(--dur-base) var(--ease-standard); }
  .toast.success { background: var(--mint-wash); color: var(--ink); }
  .toast.fail { background: var(--red-tint); color: var(--red); }

  /* ---- Stage (roll / cup / boss all render here) ---- */
  .roll-stage { display: flex; justify-content: center; position: relative; }
  .roll { position: relative; width: 220px; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
  .roll:active { cursor: grabbing; }
  .roll.danger svg { animation: shake 220ms infinite; }
  .roll:focus-visible { outline: 3px solid var(--coral); outline-offset: 6px; border-radius: var(--radius-md); }

  .idle-hint { position: absolute; left: 50%; top: 100%; margin-top: 12px; transform: translateX(-50%); width: max-content; max-width: min(300px, 80vw); font-size: 13px; color: var(--ink-50); text-align: center; overflow-wrap: break-word; animation: fadeIn var(--dur-base) var(--ease-standard); }
  .floater { position: absolute; top: 40%; left: 50%; font-size: 13px; font-weight: var(--fw-bold); color: var(--coral); white-space: nowrap; pointer-events: none; animation: floatUp 900ms var(--ease-standard) forwards; }

  /* Deliberately viewport-covering (not confined to the stage) — this is the
     arcade's one hard-fail moment, so it gets a bigger, more consequential
     flash than the routine in-panel toasts used everywhere else. */
  .caught-overlay {
    position: fixed; inset: 0; z-index: 20; background: var(--red); color: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 6px; padding: var(--space-4);
    animation: fadeIn 150ms var(--ease-standard);
  }
  .caught-title { font-weight: var(--fw-black); text-transform: uppercase; font-size: clamp(24px, 6vw, 34px); }
  .caught-body { font-size: 14px; max-width: 340px; overflow-wrap: break-word; }

  /* ---- Alert zone (footsteps / interrupt / turn-around) ---- */
  .alert-zone { min-height: 96px; display: flex; align-items: center; justify-content: center; }
  .warning-banner { width: 100%; max-width: 460px; background: var(--red); color: var(--paper); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); text-align: center; animation: fadeIn 150ms var(--ease-standard); }
  .warning-title { font-weight: var(--fw-black); text-transform: uppercase; font-size: clamp(16px, 4vw, 20px); letter-spacing: .01em; line-height: var(--lh-heading); }
  .warning-body { margin-top: 4px; font-size: clamp(13px, 3vw, 15px); line-height: var(--lh-body); overflow-wrap: break-word; }
  .warning-bar { margin-top: 10px; height: 6px; background: rgba(255,255,255,.35); border-radius: var(--radius-pill); overflow: hidden; }
  .warning-bar-fill { height: 100%; background: var(--paper); border-radius: var(--radius-pill); }

  /* ---- Primary action row (flush / fill / eat) ---- */
  .flush-row { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .flush-btn {
    font: inherit; font-weight: var(--fw-bold); letter-spacing: .04em; text-transform: uppercase; font-size: 16px;
    padding: 14px 40px; border-radius: var(--radius-pill); border: 3px solid var(--ink); background: var(--paper);
    color: var(--ink-25); cursor: not-allowed; transition: all 150ms var(--ease-standard); max-width: 90vw; overflow-wrap: break-word;
  }
  .flush-btn.armed { background: var(--red); border-color: var(--red); color: var(--paper); cursor: pointer; animation: pulseWarn 900ms infinite; }
  .flush-btn.armed:hover { filter: brightness(0.92); }
  .flush-btn.armed.disabled-look { opacity: .4; cursor: not-allowed; animation: none; filter: none; }
  .flush-hint { font-size: 12px; color: var(--ink-50); min-height: 1.4em; }

  .response-row { display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; }
  .response-btn {
    font: inherit; font-weight: var(--fw-bold); font-size: 13px; letter-spacing: .02em; text-transform: uppercase;
    padding: 12px 18px; border-radius: var(--radius-pill); border: 2px solid var(--ink); background: var(--paper);
    color: var(--ink); cursor: pointer; transition: all 120ms var(--ease-standard);
  }
  .response-btn:hover { background: var(--ink); color: var(--paper); }

  .clock-out-row { display: flex; justify-content: center; }
  .clock-out-btn {
    font: inherit; font-weight: var(--fw-bold); letter-spacing: .04em; text-transform: uppercase; font-size: 13px;
    padding: 10px 24px; border-radius: var(--radius-pill); border: 2px solid var(--ink); background: var(--paper);
    color: var(--ink); cursor: pointer; transition: all 120ms var(--ease-standard);
  }
  .clock-out-btn:hover { background: var(--ink); color: var(--paper); }

  .footer-tip { text-align: center; font-size: 12px; color: var(--ink-50); max-width: 480px; margin: 0 auto; line-height: var(--lh-body); overflow-wrap: break-word; }

  /* ---- Result / game-over modal ---- */
  .result-overlay { position: fixed; inset: 0; background: rgba(19,49,79,.55); display: flex; align-items: center; justify-content: center; padding: var(--space-4); z-index: 10; animation: fadeIn 150ms var(--ease-standard); }
  .result-card { width: 100%; max-width: 380px; background: var(--paper); border-radius: var(--radius-md); padding: var(--space-6) var(--space-5); text-align: center; box-shadow: var(--shadow-card); }
  .result-caught-title { font-weight: var(--fw-black); text-transform: uppercase; color: var(--red); font-size: clamp(18px, 4vw, 22px); }
  .result-caught-body { margin-top: 4px; font-size: 13px; color: var(--ink-70); overflow-wrap: break-word; }
  .result-score-label { margin-top: var(--space-4); font-size: 12px; font-weight: var(--fw-bold); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-50); }
  .result-score-value { font-size: 44px; font-weight: var(--fw-black); color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1.1; }
  .result-title { margin-top: var(--space-2); font-size: 15px; font-weight: var(--fw-bold); color: var(--coral); overflow-wrap: break-word; }
  .result-actions { margin-top: var(--space-5); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floatUp { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, -46px); } }
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    20% { transform: translateX(-3px) rotate(-0.6deg); }
    40% { transform: translateX(3px) rotate(0.6deg); }
    60% { transform: translateX(-2px) rotate(-0.4deg); }
    80% { transform: translateX(2px) rotate(0.4deg); }
  }
  @keyframes pulseWarn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,43,51,.45); }
    50% { box-shadow: 0 0 0 10px rgba(220,43,51,0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script src="../water-wanderer/game.js"></script>
<script src="../toilet-paper-runner/game.js"></script>
<script src="../biscuit-stealth/game.js"></script>
<script src="./app.js"></script>
</body>
</html>
